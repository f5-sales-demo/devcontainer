---
name: Docker Publish

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - claude-config/**
      - docker-compose.yml
      - .devcontainer/**
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAIN_IMAGE: ghcr.io/f5xc-salesdemos/devcontainer

jobs:
  # ── Main image: build each arch natively in parallel ──
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            cache-scope: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache-scope: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.MAIN_IMAGE }}
          cache-from: type=registry,ref=${{ env.MAIN_IMAGE }}:cache-${{ matrix.cache-scope }}
          cache-to: type=registry,ref=${{ env.MAIN_IMAGE }}:cache-${{ matrix.cache-scope }},mode=max
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.cache-scope }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge per-arch digests into a multi-arch manifest ──
  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MAIN_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYY.MM.DD'}}

      - name: Create and push manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          sources=$(printf '${{ env.MAIN_IMAGE }}@sha256:%s ' *)
          # shellcheck disable=SC2086
          docker buildx imagetools create $tags $sources
