services:
  dev:
    image: ghcr.io/f5xc-salesdemos/devcontainer:latest
    pull_policy: always
    container_name: devcontainer
    hostname: devcontainer
    env_file:
      - path: .env
        required: false
    environment:
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      - TZ=${TZ:-UTC}
    ports:
      - "127.0.0.1:${NOVNC_HOST_PORT:-6080}:6080"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
      - NET_RAW
      - NET_ADMIN
    mem_limit: 8g
    cpus: 4
    pids_limit: 4096
    tmpfs:
      - /tmp:size=256m
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped
