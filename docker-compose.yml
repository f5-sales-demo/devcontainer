services:
  dev:
    image: ghcr.io/f5xc-salesdemos/devcontainer:latest
    container_name: devcontainer
    hostname: devcontainer
    volumes:
      - workspace:/workspace
      - home:/home/vscode
    env_file:
      - path: .env
        required: false
    environment:
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-}
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
      - TZ=${TZ:-UTC}
    ports:
      - "127.0.0.1:${NOVNC_HOST_PORT:-6080}:6080"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
      - NET_RAW
      - NET_ADMIN
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8g
          pids: 4096
    tmpfs:
      - /tmp:size=256m
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: devcontainer-searxng
    hostname: searxng
    profiles:
      - search
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    configs:
      - source: searxng-settings
        target: /etc/searxng/settings.yml
    restart: unless-stopped

volumes:
  workspace:
  home:

configs:
  searxng-settings:
    content: |
      use_default_settings: true
      server:
        limiter: false
        public_instance: false
      search:
        formats:
          - html
          - json
