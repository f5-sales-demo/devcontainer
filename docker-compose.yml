services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        USERNAME: ${USERNAME:-vscode}
    container_name: devcontainer
    hostname: devcontainer
    depends_on:
      proxy:
        condition: service_healthy
    volumes:
      - workspace:/workspace
      - home:/home/${USERNAME:-vscode}
    environment:
      - ANTHROPIC_BASE_URL=http://proxy:8082
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-changeme}
      - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-}
      - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-}
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-}
      - SSH_PRIVATE_KEY=${SSH_PRIVATE_KEY:-}
    stdin_open: true
    tty: true
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: devcontainer-proxy
    hostname: proxy
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:?Set OPENAI_API_KEY in .env}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:?Set OPENAI_BASE_URL in .env}
      - BIG_MODEL=${BIG_MODEL:-gpt-4o}
      - MIDDLE_MODEL=${MIDDLE_MODEL:-gpt-4o}
      - SMALL_MODEL=${SMALL_MODEL:-gpt-4o-mini}
      - HOST=0.0.0.0
      - PORT=8082
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - MAX_TOKENS_LIMIT=${MAX_TOKENS_LIMIT:-64000}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-120}
    ports:
      - "127.0.0.1:18082:8082"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  workspace:
  home:
