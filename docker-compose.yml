services:
  dev:
    image: ghcr.io/f5xc-salesdemos/devcontainer:latest
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: missing
    container_name: devcontainer
    hostname: devcontainer
    privileged: true
    volumes:
      - workspace:/workspace
      - home:/home/vscode
    env_file:
      - path: .env
        required: false
    environment:
      - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-}
      - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - TERM=xterm-256color
      - LANG=en_US.UTF-8
      - LC_ALL=en_US.UTF-8
    ports:
      - "127.0.0.1:${NOVNC_HOST_PORT:-6080}:6080"
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: devcontainer-searxng
    hostname: searxng
    profiles:
      - search
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

volumes:
  workspace:
  home:
