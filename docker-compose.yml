---
services:
  dev:
    image: ghcr.io/f5xc-salesdemos/devcontainer:latest
    pull_policy: missing
    container_name: ${DEVCONTAINER_NAME:-devcontainer}
    hostname: ${DEVCONTAINER_NAME:-devcontainer}
    env_file:
      - path: .env
        required: false
    environment:
      - TZ=${TZ:-UTC}
      - GH_TOKEN=${GH_TOKEN:-}
    ports:
      - "127.0.0.1:${NOVNC_HOST_PORT:-6080}:6080"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
      - NET_RAW
      - NET_ADMIN
    mem_limit: 12g
    cpus: 4
    pids_limit: 4096
    tmpfs:
      - /tmp:size=256m
    stdin_open: true
    tty: true
    init: true
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    command: zsh
