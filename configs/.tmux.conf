# ── General ──────────────────────────────────────────────
set -g default-shell /usr/bin/zsh
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm*:Tc"
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g set-clipboard on

# Start window/pane indices at 1 (easier keyboard reach)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Reduce escape delay (snappy vim/neovim mode switching)
set -sg escape-time 10

# ── Prefix ───────────────────────────────────────────────
# Keep Ctrl-b as prefix (default, widely known)

# ── Key bindings ─────────────────────────────────────────
# Intuitive pane splits that mirror the direction
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows inherit the current path
bind c new-window -c "#{pane_current_path}"

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vi keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Copy mode (vi) ──────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Status bar ───────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour34,bold] #S "
set -g status-right "#[fg=colour248] %H:%M "
setw -g window-status-current-style "fg=colour34,bold"
